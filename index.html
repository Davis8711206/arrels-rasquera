<title>Caixa Arrels</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #F3F1EC;
  --card: #FFFFFF;
  --accent: #6B8F5E;
  --accent-dark: #4A6B3E;
  --accent-light: #E2EBDA;
  --text: #3B3228;
  --text-light: #8A7E70;
  --danger: #D4725C;
  --danger-light: #FCEAE6;
  --success: #6A9E7E;
  --success-light: #E8F3ED;
  --border: #DDD8D0;
  --shadow: 0 2px 12px rgba(59,50,40,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.topbar {
  background: var(--card);
  padding: 12px 20px;
  padding-top: max(12px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.topbar h1 span { color: var(--accent); }
.topbar-total { font-size: 13px; color: var(--text-light); font-weight: 500; }
.topbar-total strong { color: var(--accent-dark); font-size: 16px; font-weight: 700; }

.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.tab {
  flex: 1; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 500;
  color: var(--text-light); border: none; background: none; cursor: pointer;
  position: relative; transition: color 0.2s; font-family: inherit;
}
.tab.active { color: var(--accent-dark); font-weight: 600; }
.tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px;
  background: var(--accent); border-radius: 3px 3px 0 0;
}

.panel { display: none; padding: 16px; }
.panel.active { display: block; }

.form-section {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px;
}
.form-label {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 8px; display: block;
}
.form-input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-size: 16px; font-family: inherit;
  color: var(--text); background: var(--bg); transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus { outline: none; border-color: var(--accent); background: #FFF; }
.form-input::placeholder { color: #C4BBB3; }

.amount-wrapper { position: relative; }
.amount-wrapper .form-input {
  font-size: 28px; font-weight: 700; text-align: center;
  padding: 20px 40px; letter-spacing: 1px;
}
.amount-wrapper .currency {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 20px; font-weight: 600; color: var(--text-light);
}

.quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
.quick-btn {
  padding: 10px 4px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); font-size: 14px; font-weight: 600; color: var(--text);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.quick-btn:active { background: var(--accent-light); border-color: var(--accent); transform: scale(0.96); }

.services-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.service-chip {
  padding: 10px 16px; border: 2px solid var(--border); border-radius: 50px;
  background: var(--card); font-size: 14px; font-weight: 500; color: var(--text);
  cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
}
.service-chip.selected { background: var(--accent); border-color: var(--accent); color: #FFF; }
.service-chip:active { transform: scale(0.95); }

.btn-save {
  width: 100%; padding: 18px; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #FFF; font-size: 17px; font-weight: 700; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  box-shadow: 0 4px 16px rgba(107,143,94,0.35); transition: all 0.2s;
}
.btn-save:active { transform: scale(0.97); opacity: 0.9; }
.btn-save:disabled { opacity: 0.4; pointer-events: none; }

.month-selector {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; padding: 8px 0 16px;
}
.month-nav {
  width: 40px; height: 40px; border: 2px solid var(--border); border-radius: 50%;
  background: var(--card); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-family: inherit; transition: all 0.15s;
}
.month-nav:active { background: var(--accent-light); }
.month-label { font-size: 17px; font-weight: 600; min-width: 160px; text-align: center; }

.day-group { margin-bottom: 16px; }
.day-header {
  font-size: 13px; font-weight: 600; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px 8px;
  display: flex; justify-content: space-between;
}
.record-card {
  background: var(--card); border-radius: var(--radius-sm); padding: 14px 16px;
  margin-bottom: 6px; box-shadow: 0 1px 4px rgba(59,50,40,0.05);
  display: flex; align-items: center; justify-content: space-between;
}
.record-info { flex: 1; }
.record-client { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.record-service { font-size: 13px; color: var(--text-light); }
.record-amount { font-size: 18px; font-weight: 700; color: var(--accent-dark); margin-right: 8px; }
.record-delete {
  width: 32px; height: 32px; border: none; border-radius: 50%;
  background: var(--danger-light); color: var(--danger); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.record-delete:active { background: var(--danger); color: #FFF; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--card); border-radius: var(--radius-sm); padding: 14px;
  box-shadow: 0 1px 4px rgba(59,50,40,0.05); text-align: center;
}
.stat-value { font-size: 22px; font-weight: 700; color: var(--accent-dark); }
.stat-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.summary-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 12px;
}
.summary-row {
  display: flex; justify-content: space-between; align-items: center; padding: 8px 0;
}
.summary-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.summary-label { font-size: 14px; color: var(--text-light); }
.summary-value { font-size: 16px; font-weight: 700; }

.btn-export {
  width: 100%; padding: 16px; border: 2px solid var(--accent);
  border-radius: var(--radius); background: var(--card); color: var(--accent-dark);
  font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: all 0.2s; margin-top: 8px;
}
.btn-export:active { background: var(--accent-light); }

.btn-export-all {
  width: 100%; padding: 16px; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #FFF; font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; box-shadow: 0 4px 16px rgba(107,143,94,0.35);
  transition: all 0.2s; margin-top: 8px;
}
.btn-export-all:active { transform: scale(0.97); }

.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text); color: #FFF; padding: 14px 24px;
  border-radius: 50px; font-size: 14px; font-weight: 600;
  z-index: 1000; opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(45,36,32,0.4);
  backdrop-filter: blur(4px); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  width: 100%; max-width: 500px; animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn {
  flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s;
}
.modal-btn.cancel { background: var(--bg); color: var(--text); }
.modal-btn.confirm { background: var(--danger); color: #FFF; }
.modal-btn:active { transform: scale(0.96); }

.settings-section { margin-bottom: 20px; }
.settings-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 10px;
}
.service-edit-list { display: flex; flex-direction: column; gap: 6px; }
.service-edit-row { display: flex; align-items: center; gap: 8px; }
.service-edit-row .form-input { flex: 1; padding: 10px 14px; font-size: 14px; }
.btn-remove-service {
  width: 36px; height: 36px; border: none; border-radius: 50%;
  background: var(--danger-light); color: var(--danger); font-size: 18px;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.btn-add-service {
  padding: 10px; border: 2px dashed var(--border); border-radius: var(--radius-sm);
  background: none; color: var(--text-light); font-size: 14px; font-weight: 500;
  cursor: pointer; width: 100%; font-family: inherit; margin-top: 6px;
}
.btn-danger-full {
  width: 100%; padding: 14px; border: 2px solid var(--danger);
  border-radius: var(--radius-sm); background: var(--danger-light);
  color: var(--danger); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
/* ===== AGENDA ===== */
.year-nav { display:flex; align-items:center; justify-content:center; gap:16px; padding:14px 0 10px; }
.year-label { font-size:20px; font-weight:700; color:var(--text); min-width:80px; text-align:center; }
.year-btn { background:none; border:none; font-size:24px; color:var(--accent); padding:4px 10px; cursor:pointer; line-height:1; }
.months-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 4px 20px; }
.month-mini { background:var(--card); border-radius:12px; padding:8px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
.month-mini-name { text-align:center; font-size:12px; font-weight:700; color:var(--accent-dark); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.mini-cal { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
.mini-cal-hdr { text-align:center; font-size:8px; color:var(--text-light); font-weight:600; padding:2px 0; }
.mini-day { text-align:center; font-size:10px; padding:3px 1px; border-radius:50%; line-height:1.4; cursor:pointer; color:var(--text); }
.mini-day:active { opacity:.6; }
.mini-day.has-apt { background:var(--accent); color:#fff; font-weight:700; border-radius:50%; }
.mini-day.today { outline:2px solid var(--accent); outline-offset:1px; font-weight:700; }
.mini-day.other-month { color:transparent; pointer-events:none; }
.day-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:none; align-items:flex-end; }
.day-modal-overlay.show { display:flex; }
.day-modal { background:#fff; border-radius:20px 20px 0 0; width:100%; max-height:80vh; overflow-y:auto; padding:20px 16px 40px; }
.day-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.day-modal-title { font-size:17px; font-weight:700; color:var(--text); }
.day-modal-close { background:var(--bg); border:none; border-radius:50%; width:30px; height:30px; font-size:18px; color:var(--text-light); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.apt-card { background:var(--card); border-radius:10px; padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.apt-time { font-size:15px; font-weight:700; color:var(--accent-dark); min-width:44px; }
.apt-info { flex:1; }
.apt-client { font-size:14px; font-weight:600; color:var(--text); }
.apt-service { font-size:12px; color:var(--text-light); margin-top:1px; }
.apt-del { background:none; border:none; color:#C00; font-size:18px; cursor:pointer; padding:4px 6px; }
.btn-add-apt { width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; font-family:inherit; }
.empty-apt { text-align:center; color:var(--text-light); font-size:14px; padding:20px 0 10px; }
.apt-form-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300; display:none; align-items:flex-end; }
.apt-form-overlay.show { display:flex; }
.apt-form-modal { background:#fff; border-radius:20px 20px 0 0; width:100%; padding:20px 16px 40px; }
.apt-form-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:14px; }
.apt-form-row { margin-bottom:12px; }
.apt-form-label { font-size:12px; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; display:block; }
</style>
</head>

  <button class="tab" onclick="switchTab('agenda')">📅</button>
</div>

<div id="panel-register" class="panel active">
  <div class="form-section">
    <label class="form-label">Import</label>
    <div class="amount-wrapper">
      <input type="number" id="inputAmount" class="form-input" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
      <span class="currency">€</span>
    </div>
    <div class="quick-amounts" id="quickAmountsGrid"></div>
  </div>

  <div class="form-section">
    <label class="form-label">Servei</label>
    <div class="services-grid" id="servicesGrid"></div>
    <input type="text" id="inputServiceCustom" class="form-input" placeholder="Altre servei..." style="margin-top:4px;">
  </div>

  <div class="form-section">
    <label class="form-label">Client</label>
    <input type="text" id="inputClient" class="form-input" placeholder="Nom (opcional)" autocomplete="off">
    <div id="clientSuggestions" style="margin-top:6px; display:flex; flex-wrap:wrap; gap:6px;"></div>
  </div>

  <button class="btn-save" onclick="saveRecord()">Desar pagament</button>
</div>

<div id="panel-records" class="panel">
  <div class="month-selector">
    <button class="month-nav" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div id="recordsList"></div>
</div>

<div id="panel-summary" class="panel">
  <div class="month-selector">
    <button class="month-nav" onclick="changeSummaryMonth(-1)">‹</button>
    <div class="month-label" id="summaryMonthLabel"></div>
    <button class="month-nav" onclick="changeSummaryMonth(1)">›</button>
  </div>
  <div id="summaryContent"></div>
  <button class="btn-export" onclick="exportMonth()">📊 Exportar mes a Excel</button>
  <button class="btn-export-all" onclick="exportAll()">📦 Exportar TOT a Excel</button>
</div>

<div id="panel-settings" class="panel">
  <div class="form-section">
    <div class="settings-section">
      <div class="settings-title">Serveis predefinits</div>
      <div class="service-edit-list" id="serviceEditList"></div>
      <button class="btn-add-service" onclick="addServiceField()">+ Afegir servei</button>
    </div>
  </div>
  <div class="form-section">
    <div class="settings-section">
      <div class="settings-title">Imports ràpids (€)</div>
      <input type="text" id="quickAmountsInput" class="form-input" placeholder="10, 15, 20, 25, 30, 40, 50, 60" style="font-size:14px;">
      <button class="btn-add-service" onclick="saveQuickAmounts()" style="margin-top:8px; border-style:solid; border-color:var(--accent); color:var(--accent);">Desar imports</button>
    </div>
  </div>
  <div class="form-section">
    <div class="settings-section">
      <div class="settings-title">Dades</div>
      <button class="btn-danger-full" onclick="confirmClearAll()">🗑️ Esborrar totes les dades</button>
    </div>
  </div>
</div>

<div id="panel-agenda" class="panel">
  <div class="year-nav">
    <button class="year-btn" onclick="changeYear(-1)">&#8249;</button>
    <div class="year-label" id="agendaYearLabel"></div>
    <button class="year-btn" onclick="changeYear(1)">&#8250;</button>
  </div>
  <div class="months-grid" id="monthsGrid"></div>
</div>

<div class="day-modal-overlay" id="dayModal">
  <div class="day-modal">
    <div class="day-modal-header">
      <div class="day-modal-title" id="dayModalTitle"></div>
      <button class="day-modal-close" onclick="closeDayModal()">&#x2715;</button>
    </div>
    <div id="dayAptList"></div>
    <button class="btn-add-apt" onclick="openAptForm()">+ Afegir cita</button>
  </div>
</div>

<div class="apt-form-overlay" id="aptFormModal">
  <div class="apt-form-modal">
    <div class="apt-form-title">Nova cita</div>
    <div class="apt-form-row">
      <label class="apt-form-label">Hora</label>
      <input type="time" id="aptTime" class="form-input" value="10:00">
    </div>
    <div class="apt-form-row">
      <label class="apt-form-label">Client</label>
      <input type="text" id="aptClient" class="form-input" placeholder="Nom del client" autocomplete="off">
    </div>
    <div class="apt-form-row">
      <label class="apt-form-label">Servei</label>
      <div id="aptServiceChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;"></div>
      <input type="text" id="aptServiceCustom" class="form-input" placeholder="Altre servei..." style="margin-top:4px;">
    </div>
    <div class="apt-form-row">
      <label class="apt-form-label">Notes (opcional)</label>
      <input type="text" id="aptNotes" class="form-input" placeholder="Observacions...">
    </div>
    <button class="btn-save" onclick="saveApt()" style="margin-top:6px;">Desar cita</button>
    <button style="width:100%;padding:12px;background:none;border:none;color:var(--text-light);font-size:15px;cursor:pointer;margin-top:4px;font-family:inherit;" onclick="closeAptForm()">Cancel&#xB7;lar</button>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Eliminar aquest registre?</h3>
    <p id="deleteDetail" style="text-align:center; color:var(--text-light); font-size:14px; margin-bottom:8px;"></p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel·lar</button>
      <button class="modal-btn confirm" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="clearModal">
  <div class="modal">
    <h3>⚠️ Esborrar TOTES les dades?</h3>
    <p style="text-align:center; color:var(--text-light); font-size:14px;">Aquesta acció no es pot desfer.</p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="document.getElementById('clearModal').classList.remove('show')">Cancel·lar</button>
      <button class="modal-btn confirm" onclick="clearAllData()">Esborrar tot</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== DATA ==========
const STORAGE_KEY = 'arrels_caja_v1';
const AGENDA_KEY = 'arrels_agenda_v1';
const SERVICES_KEY = 'arrels_services_v1';
const QUICK_KEY = 'arrels_quick_v1';
const DEFAULT_SERVICES = ['Massatge llarg', 'Massatge curt', 'Arreglar celles', 'Pedicura', 'Manicura', 'Tractament facial', 'Cosmètica/Botiga'];
const DEFAULT_QUICK = [10, 15, 20, 25, 30, 35, 40, 50];

function load(key, fallback) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
  catch { return fallback; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

let records = load(STORAGE_KEY, []);
let agenda = load(AGENDA_KEY, []);
let services = load(SERVICES_KEY, DEFAULT_SERVICES);
let quickAmounts = load(QUICK_KEY, DEFAULT_QUICK);
let selectedService = '';
let currentMonth = new Date();
let summaryMonth = new Date();
let pendingDeleteId = null;

// ========== TABS ==========
const PANELS = ['register','records','summary','settings','agenda'];
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const active = PANELS[i] === name;
    t.classList.toggle('active', active);
    document.getElementById('panel-' + PANELS[i]).classList.toggle('active', active);
  });
  if (name === 'records') renderRecords();
  if (name === 'summary') renderSummary();
  if (name === 'settings') renderSettings();
  if (name === 'agenda') renderAgenda();
}

// ========== REGISTER ==========
function setAmount(val) {
  document.getElementById('inputAmount').value = val;
}

function renderServiceChips() {
  document.getElementById('servicesGrid').innerHTML = services.map(s =>
    `<button class="service-chip ${selectedService === s ? 'selected' : ''}" onclick="selectService(this, '${s.replace(/'/g, "\\'")}')">${s}</button>`
  ).join('');
}
function selectService(el, s) {
  selectedService = selectedService === s ? '' : s;
  if (selectedService) document.getElementById('inputServiceCustom').value = '';
  renderServiceChips();
}

function renderClientSuggestions() {
  const container = document.getElementById('clientSuggestions');
  const val = document.getElementById('inputClient').value.toLowerCase().trim();
  const recent = [];
  for (let i = records.length - 1; i >= 0 && recent.length < 8; i--) {
    if (records[i].client && !recent.includes(records[i].client)) recent.push(records[i].client);
  }
  const list = val ? recent.filter(c => c.toLowerCase().includes(val)).slice(0, 6) : recent;
  container.innerHTML = list.map(c =>
    `<button class="service-chip" style="font-size:13px;padding:6px 12px;" onclick="document.getElementById('inputClient').value='${c.replace(/'/g,"\\'")}';renderClientSuggestions();">${c}</button>`
  ).join('');
}
document.getElementById('inputClient').addEventListener('input', renderClientSuggestions);
document.getElementById('inputClient').addEventListener('focus', renderClientSuggestions);

document.getElementById('inputServiceCustom').addEventListener('input', function() {
  if (this.value.trim()) { selectedService = ''; renderServiceChips(); }
});

function saveRecord() {
  const amount = parseFloat(document.getElementById('inputAmount').value);
  if (!amount || amount <= 0) { showToast('⚠️ Introdueix un import'); return; }
  const custom = document.getElementById('inputServiceCustom').value.trim();
  const service = custom || selectedService || '';
  const client = document.getElementById('inputClient').value.trim();
  records.push({
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
    date: new Date().toISOString(),
    amount, service, client
  });
  save(STORAGE_KEY, records);
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputServiceCustom').value = '';
  document.getElementById('inputClient').value = '';
  selectedService = '';
  renderServiceChips();
  renderClientSuggestions();
  updateTodayTotal();
  showToast('✅ ' + fmtCur(amount) + ' registrat');
}

function updateTodayTotal() {
  const today = new Date().toDateString();
  const t = records.filter(r => new Date(r.date).toDateString() === today).reduce((s, r) => s + r.amount, 0);
  document.getElementById('todayTotal').textContent = fmtCur(t);
}

// ========== RECORDS ==========
function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth() + dir); renderRecords(); }

function renderRecords() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  document.getElementById('monthLabel').textContent = monthName(m) + ' ' + y;
  const mr = records.filter(r => { const d = new Date(r.date); return d.getFullYear() === y && d.getMonth() === m; })
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const c = document.getElementById('recordsList');
  if (!mr.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Sense registres aquest mes</p></div>'; return; }
  const groups = {};
  mr.forEach(r => { const k = new Date(r.date).toDateString(); if (!groups[k]) groups[k] = []; groups[k].push(r); });
  let html = '';
  for (const [dk, recs] of Object.entries(groups)) {
    const dt = recs.reduce((s, r) => s + r.amount, 0);
    html += `<div class="day-group"><div class="day-header"><span>${fmtDayShort(new Date(dk))}</span><span>${fmtCur(dt)}</span></div>`;
    recs.forEach(r => {
      html += `<div class="record-card"><div class="record-info"><div class="record-client">${r.client||'Sense nom'}</div><div class="record-service">${r.service||'Sense servei'} · ${fmtTime(new Date(r.date))}</div></div><div class="record-amount">${fmtCur(r.amount)}</div><button class="record-delete" onclick="requestDelete('${r.id}')">✕</button></div>`;
    });
    html += '</div>';
  }
  c.innerHTML = html;
}

// ========== DELETE ==========
function requestDelete(id) {
  pendingDeleteId = id;
  const r = records.find(r => r.id === id);
  document.getElementById('deleteDetail').textContent = `${r.client||'Sense nom'} — ${fmtCur(r.amount)} — ${r.service||''}`;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); pendingDeleteId = null; }
function confirmDelete() {
  records = records.filter(r => r.id !== pendingDeleteId);
  save(STORAGE_KEY, records);
  closeDeleteModal(); renderRecords(); updateTodayTotal(); showToast('Registre eliminat');
}

// ========== SUMMARY ==========
function changeSummaryMonth(dir) { summaryMonth.setMonth(summaryMonth.getMonth() + dir); renderSummary(); }

function renderSummary() {
  const y = summaryMonth.getFullYear(), m = summaryMonth.getMonth();
  document.getElementById('summaryMonthLabel').textContent = monthName(m) + ' ' + y;
  const mr = records.filter(r => { const d = new Date(r.date); return d.getFullYear() === y && d.getMonth() === m; });
  const total = mr.reduce((s, r) => s + r.amount, 0);
  const count = mr.length;
  const avg = count ? total / count : 0;
  const days = new Set(mr.map(r => new Date(r.date).toDateString())).size;
  const byService = {};
  mr.forEach(r => { const k = r.service || 'Sense servei'; if (!byService[k]) byService[k] = {c:0,t:0}; byService[k].c++; byService[k].t += r.amount; });
  let html = `<div class="stats-row"><div class="stat-card"><div class="stat-value">${fmtCur(total)}</div><div class="stat-label">Total mes</div></div><div class="stat-card"><div class="stat-value">${count}</div><div class="stat-label">Operacions</div></div></div>`;
  html += `<div class="stats-row"><div class="stat-card"><div class="stat-value">${fmtCur(avg)}</div><div class="stat-label">Mitjana/operació</div></div><div class="stat-card"><div class="stat-value">${days}</div><div class="stat-label">Dies amb registre</div></div></div>`;
  if (Object.keys(byService).length) {
    html += `<div class="summary-card"><div style="font-size:13px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Per servei</div>`;
    Object.entries(byService).sort((a,b) => b[1].t - a[1].t).forEach(([svc, d]) => {
      html += `<div class="summary-row"><span class="summary-label">${svc} <span style="opacity:0.5">(${d.c})</span></span><span class="summary-value">${fmtCur(d.t)}</span></div>`;
    });
    html += '</div>';
  }
  document.getElementById('summaryContent').innerHTML = html;
}

// ========== EXPORT (iOS COMPATIBLE) ==========
function buildMonthWb(y, m) {
  const mr = records.filter(r => { const d = new Date(r.date); return d.getFullYear() === y && d.getMonth() === m; })
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  if (!mr.length) return null;
  const data = mr.map(r => ({
    'Data': fmtDateFull(new Date(r.date)), 'Hora': fmtTime(new Date(r.date)),
    'Client': r.client || '', 'Servei': r.service || '', 'Import (€)': r.amount
  }));
  data.push({'Data':'','Hora':'','Client':'','Servei':'TOTAL','Import (€)': mr.reduce((s,r)=>s+r.amount,0)});
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:12},{wch:8},{wch:20},{wch:18},{wch:12}];
  return { ws, name: (monthName(m)+' '+y).substring(0,31) };
}

function shareFile(wb, filename) {
  try {
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const file = new File([blob], filename, { type: blob.type });

    // Web Share API — opens iOS native share sheet
    if (typeof navigator.share === 'function' && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] }).then(() => {
        showToast('✅ Excel compartit');
      }).catch(err => {
        if (err.name !== 'AbortError') showToast('⚠️ Compartir cancel·lat');
      });
    } else {
      // Non-iOS or old browser: standard download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 3000);
      showToast('📊 Excel descarregat');
    }
  } catch(e) {
    showToast('⚠️ Error: ' + e.message);
    console.error('Export error:', e);
  }
}

function exportMonth() {
  const y = summaryMonth.getFullYear(), m = summaryMonth.getMonth();
  const result = buildMonthWb(y, m);
  if (!result) { showToast('⚠️ No hi ha dades'); return; }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, result.ws, result.name);
  shareFile(wb, `Arrels_${monthName(m)}_${y}.xlsx`);
}

function exportAll() {
  if (!records.length) { showToast('⚠️ No hi ha dades'); return; }
  const sorted = [...records].sort((a,b) => new Date(a.date) - new Date(b.date));
  const byMonth = {};
  sorted.forEach(r => {
    const d = new Date(r.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = { y: d.getFullYear(), m: d.getMonth(), recs: [] };
    byMonth[key].recs.push(r);
  });
  const wb = XLSX.utils.book_new();
  for (const g of Object.values(byMonth)) {
    const result = buildMonthWb(g.y, g.m);
    if (result) XLSX.utils.book_append_sheet(wb, result.ws, result.name);
  }
  // Summary sheet
  const sd = Object.values(byMonth).map(g => ({
    'Mes': monthName(g.m)+' '+g.y,
    'Operacions': g.recs.length,
    'Total (€)': g.recs.reduce((s,r)=>s+r.amount,0)
  }));
  sd.push({'Mes':'TOTAL GENERAL','Operacions':records.length,'Total (€)':records.reduce((s,r)=>s+r.amount,0)});
  const sws = XLSX.utils.json_to_sheet(sd);
  sws['!cols'] = [{wch:20},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, sws, 'Resumen');
  shareFile(wb, 'Arrels_Rasquera_Complet.xlsx');
}

// ========== SETTINGS ==========
function renderSettings() {
  document.getElementById('serviceEditList').innerHTML = services.map((s, i) =>
    `<div class="service-edit-row"><input class="form-input" value="${s}" onchange="updateService(${i}, this.value)"><button class="btn-remove-service" onclick="removeService(${i})">✕</button></div>`
  ).join('');
  document.getElementById('quickAmountsInput').value = quickAmounts.join(', ');
}
function updateService(i, val) { if (val.trim()) { services[i] = val.trim(); save(SERVICES_KEY, services); renderServiceChips(); } }
function removeService(i) { services.splice(i,1); save(SERVICES_KEY, services); renderSettings(); renderServiceChips(); }
function addServiceField() { services.push('Nou'); save(SERVICES_KEY, services); renderSettings(); }
function saveQuickAmounts() {
  const p = document.getElementById('quickAmountsInput').value.split(',').map(v=>parseFloat(v.trim())).filter(v=>!isNaN(v)&&v>0);
  if (p.length) { quickAmounts = p; save(QUICK_KEY, quickAmounts); renderQuickButtons(); showToast('✅ Imports actualitzats'); }
}
function renderQuickButtons() {
  document.getElementById('quickAmountsGrid').innerHTML = quickAmounts.map(v =>
    `<button class="quick-btn" onclick="setAmount(${v})">${v}€</button>`
  ).join('');
}
function confirmClearAll() { document.getElementById('clearModal').classList.add('show'); }
function clearAllData() {
  records = []; save(STORAGE_KEY, records);
  document.getElementById('clearModal').classList.remove('show');
  updateTodayTotal(); showToast('Dades eliminades');
}

// ========== UTILS ==========
function fmtCur(n) { return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function fmtTime(d) { return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateFull(d) { return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDayShort(d) { return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}); }
function monthName(m) { return ['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'][m]; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ========== AGENDA ==========
const WEEK_DAYS_SHORT = ['Dl','Dm','Dc','Dj','Dv','Ds','Dg'];
const MONTH_NAMES_SHORT = ['Gen','Feb','Mar','Abr','Mai','Jun','Jul','Ago','Set','Oct','Nov','Des'];
let agendaYear = new Date().getFullYear();
let selectedDayStr = '';
let aptSelectedService = '';

function changeYear(dir) { agendaYear += dir; renderAgenda(); }

function renderAgenda() {
  document.getElementById('agendaYearLabel').textContent = agendaYear;
  const today = new Date();
  const aptDates = new Set(agenda.map(a => a.date));
  let html = '';
  for (let m = 0; m < 12; m++) {
    html += '<div class="month-mini"><div class="month-mini-name">' + MONTH_NAMES_SHORT[m] + '</div><div class="mini-cal">';
    WEEK_DAYS_SHORT.forEach(function(d) { html += '<div class="mini-cal-hdr">' + d + '</div>'; });
    const firstDay = new Date(agendaYear, m, 1).getDay();
    const startOffset = (firstDay + 6) % 7;
    const daysInMonth = new Date(agendaYear, m + 1, 0).getDate();
    for (let i = 0; i < startOffset; i++) html += '<div class="mini-day other-month"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = agendaYear + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday = today.getFullYear()===agendaYear && today.getMonth()===m && today.getDate()===d;
      const hasApt = aptDates.has(ds);
      const cls = (hasApt ? 'has-apt ' : '') + (isToday ? 'today' : '');
      html += '<div class="mini-day ' + cls + '" onclick="openDay(\'' + ds + '\')">' + d + '</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('monthsGrid').innerHTML = html;
}

function openDay(dateStr) {
  selectedDayStr = dateStr;
  const parts = dateStr.split('-');
  const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const dayName = dateObj.toLocaleDateString('ca-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('dayModalTitle').textContent = dayName.charAt(0).toUpperCase() + dayName.slice(1);
  renderDayApts();
  document.getElementById('dayModal').classList.add('show');
}

function closeDayModal() {
  document.getElementById('dayModal').classList.remove('show');
  renderAgenda();
}

function renderDayApts() {
  const apts = agenda.filter(function(a){ return a.date === selectedDayStr; }).sort(function(a,b){ return a.time.localeCompare(b.time); });
  const c = document.getElementById('dayAptList');
  if (!apts.length) { c.innerHTML = '<div class="empty-apt">Cap cita per aquest dia</div>'; return; }
  c.innerHTML = apts.map(function(a) {
    return '<div class="apt-card"><div class="apt-time">' + a.time + '</div><div class="apt-info"><div class="apt-client">' + (a.client||'Sense nom') + '</div><div class="apt-service">' + (a.service||'') + (a.notes ? ' &middot; ' + a.notes : '') + '</div></div><button class="apt-del" onclick="deleteApt(\'' + a.id + '\')">&#x2715;</button></div>';
  }).join('');
}

function deleteApt(id) {
  agenda = agenda.filter(function(a){ return a.id !== id; });
  save(AGENDA_KEY, agenda);
  renderDayApts();
  showToast('Cita eliminada');
}

function openAptForm() {
  aptSelectedService = '';
  document.getElementById('aptTime').value = '10:00';
  document.getElementById('aptClient').value = '';
  document.getElementById('aptServiceCustom').value = '';
  document.getElementById('aptNotes').value = '';
  renderAptServiceChips();
  document.getElementById('aptFormModal').classList.add('show');
}

function closeAptForm() { document.getElementById('aptFormModal').classList.remove('show'); }

function renderAptServiceChips() {
  document.getElementById('aptServiceChips').innerHTML = services.map(function(s) {
    return '<button class="service-chip ' + (aptSelectedService===s?'selected':'') + '" onclick="selectAptService(\'' + s.replace(/'/g,"\\'") + '\')">' + s + '</button>';
  }).join('');
}

function selectAptService(s) {
  aptSelectedService = aptSelectedService === s ? '' : s;
  if (aptSelectedService) document.getElementById('aptServiceCustom').value = '';
  renderAptServiceChips();
}

function saveApt() {
  const time = document.getElementById('aptTime').value;
  if (!time) { showToast('Indica l\'hora'); return; }
  const custom = document.getElementById('aptServiceCustom').value.trim();
  const service = custom || aptSelectedService || '';
  const client = document.getElementById('aptClient').value.trim();
  const notes = document.getElementById('aptNotes').value.trim();
  agenda.push({ id: Date.now().toString(36) + Math.random().toString(36).substr(2,5), date: selectedDayStr, time: time, client: client, service: service, notes: notes });
  save(AGENDA_KEY, agenda);
  closeAptForm();
  renderDayApts();
  showToast('Cita desada');
}

// ========== INIT ==========
renderServiceChips();
renderQuickButtons();
renderClientSuggestions();
updateTodayTotal();
</script>
</body>
</html>
